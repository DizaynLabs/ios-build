workflows:
  ios-build-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "Unity-iPhone.xcodeproj"
        XCODE_SCHEME: "Unity-iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Git LFS files checkout
        script: | 
          git lfs pull
      - name: Initialize keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.Solmazdijital.ios-build" --platform IOS --type APP_STORE --create
          keychain add-certificates
      - name: Increment build number
        script: |
          agvtool new-version -all $BUILD_NUMBER
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-allowProvisioningUpdates"
    artifacts:
      - build/ios/ipa/*.ipa
