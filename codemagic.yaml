workflows:
  ios-build-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "Unity-iPhone.xcodeproj"
        XCODE_SCHEME: "Unity-iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Git LFS files checkout
        script: | 
          git lfs pull
      - name: Fix Unity Script Permissions
        script: |
          chmod +x process_symbols.sh || true
      - name: Initialize keychain and code signing
        script: |
          keychain initialize
          xcode-project use-profiles
      - name: Increment build number
        script: |
          agvtool new-version -all $BUILD_NUMBER
      - name: Build App Store Archive and Export
        script: |
          # 1. Arşivi başarıyla oluştur (Az önce geçen adım)
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/ios/xcarchive/Unity-iPhone.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

          # 2. Arşivden doğrudan IPA çıktısı üret
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/Unity-iPhone.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist || true
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
