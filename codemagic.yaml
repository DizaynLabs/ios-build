workflows:
  ios-build-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "Unity-iPhone.xcodeproj"
        XCODE_SCHEME: "Unity-iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Fix Unity Script Permissions
        script: |
          chmod +x process_symbols.sh || true
      - name: Initialize keychain and code signing
        script: |
          keychain initialize
          xcode-project use-profiles --bundle-identifier="com.solmaz.blokgame"
      - name: Increment build number
        script: |
          agvtool new-version -all $BUILD_NUMBER
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
    artifacts:
      - build/ios/ipa/*.ipa
